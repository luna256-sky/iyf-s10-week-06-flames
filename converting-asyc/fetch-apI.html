<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fetch Practice</title>
</head>
<body>

  <h2>Single User</h2>
  <div id="single-user"></div>

  <h2>All Users</h2>
  <div id="all-users"></div>

  <h2>User 1 Posts</h2>
  <div id="posts"></div>

  <script>
    async function fetchData() {
      try {
        // Fetch all data at once (parallel)
        const [singleRes, allRes, postsRes] = await Promise.all([
          fetch("https://jsonplaceholder.typicode.com/users/1"),
          fetch("https://jsonplaceholder.typicode.com/users"),
          fetch("https://jsonplaceholder.typicode.com/users/1/posts")
        ]);

        // Convert to JSON
        const singleUser = await singleRes.json();
        const allUsers = await allRes.json();
        const posts = await postsRes.json();

        // Display single user
        document.getElementById("single-user").innerHTML = `
          <p><strong>${singleUser.name}</strong> (${singleUser.email})</p>
        `;

        // Display all users
        const allUsersDiv = document.getElementById("all-users");
        allUsers.forEach(user => {
          const p = document.createElement("p");
          p.textContent = user.name;
          allUsersDiv.appendChild(p);
        });

        // Display posts
        const postsDiv = document.getElementById("posts");
        posts.forEach(post => {
          const div = document.createElement("div");
          div.innerHTML = `
            <h4>${post.title}</h4>
            <p>${post.body}</p>
            <hr>
          `;
          postsDiv.appendChild(div);
        });

      } catch (error) {
        console.error("Error fetching data:", error);
      }
    }

    fetchData();
  </script>

</body>
</html>
